# config/camera.yaml

# ─────────────────────────────────────────
# 스트림 설정
# ─────────────────────────────────────────
cameras:
  - id: 0
    name: "phone_cam"
    stream_url: "http://192.168.0.10:8080/video"  # IP Webcam 앱 주소로 교체
    enabled: true

# CCTV 연결 시 아래처럼 교체
#   stream_url: "rtsp://192.168.0.2/stream"


# ─────────────────────────────────────────
# 카메라 내부 파라미터
# camera_calibration.py 실행 후 실측값으로 교체
# ─────────────────────────────────────────
intrinsics:
  fx: 1400.0
  fy: 1400.0
  cx: 960.0
  cy: 540.0

resolution:
  width: 1920
  height: 1080
  fps: 30


# ─────────────────────────────────────────
# 카메라 외부 파라미터
# 휴대폰을 높은 곳에 고정 후 실측 입력
# ─────────────────────────────────────────
extrinsics:
  height_m: 2.0       # 휴대폰 거치 높이 (줄자로 측정)
  tilt_deg: 45.0      # 아래를 향한 각도
  pan_deg: 0.0


# ─────────────────────────────────────────
# DA2 깊이 추정 범위
# ─────────────────────────────────────────
depth:
  min_depth_m: 0.5
  max_depth_m: 6.0    # 휴대폰 거치 높이 기준 여유값