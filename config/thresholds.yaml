# config/thresholds.yaml

# ─────────────────────────────────────────
# 낙상 1차 판정 기준 (의사 코드 기반)
# 아래 조건들이 동시에 충족되면 낙상 후보로 등록
# ─────────────────────────────────────────
fall_detection:

  # 상체 기울기 비율 (논문 1 기준: |Δy / (Δx + ε)|)
  # 어깨-엉덩이 벡터의 기울기 ratio
  # 1.0 = 45°, 0.5 ≈ 27° (수평에 가까울수록 낙상 가능성 높음)
  # 낙상 조건: angle_ratio < 0.5 (논문 1)
  body_angle_ratio_threshold: 0.5

  # 엉덩이(hip) 실제 이동 속도 임계값 (m/s)
  # 이 값 이상으로 빠르게 이동하면 낙상 후보
  # 의사 코드의 threshold_v에 해당
  # 참고: 성인 보행 속도 ~1.4 m/s, 낙상 시 ~2.0 m/s 이상
  hip_velocity_threshold: 2.0

  # 엉덩이(hip) y좌표 임계값 (픽셀)
  # hip_y가 이 값보다 커야 낙상으로 판정 (화면 하단 = 값이 큼)
  # 의사 코드의 threshold_h에 해당
  # 실측 후 조정 필요 (해상도 1080 기준 초기값)
  hip_y_threshold: 400

  # 발목-엉덩이 y좌표 차이 임계값 (픽셀)
  # |y_hips - y_feet| < 이 값이면 몸이 수평으로 누운 상태 (논문 1)
  # 낙상과 슬라이드 착지 오탐 구분에 유효
  feet_hip_y_diff_threshold: 30

  # bounding box 종횡비 임계값 (논문 2의 H < W 조건)
  # width / height 가 이 값 이상이면 가로로 누운 상태
  bbox_ratio_threshold: 0.9

  # 무게중심(CoG) 수직 이동 속도 임계값 (m/s)
  # 논문 1의 CoG 급격한 하강 조건
  # hip_velocity와 함께 OR 조건으로 사용 권장
  cog_velocity_threshold: 1.8

  # 낙상 판정 확정 프레임 수
  # 연속 N프레임 조건 충족 시 낙상으로 확정 (오감지 방지)
  confirm_frames: 3

  # 낙상 후 재판정 억제 시간 (초)
  # 같은 사람이 연속으로 낙상 판정되는 것을 방지
  cooldown_sec: 5.0


# ─────────────────────────────────────────
# 위험도 등급 (3단계)
# 낙상 확정 후 머리의 충격으로 위험도를 판단
#
# 물리 공식: I = m × Δv  (충격량 = 질량 × 속도 변화량)
# Δv = |prev_head_velocity - head_velocity|
#   → 바닥 충돌 순간 속도가 급감하면 Δv가 커짐
#   → 빠르게 충돌할수록 더 큰 충격으로 판단
#
# 머리가 floor_y 이상 내려왔을 때만 위험도 계산
# 그 외는 "저위험(low)" 으로 고정
# ─────────────────────────────────────────
danger_level:

  # 성인 두부 추정 질량 (kg)
  head_mass_kg: 5.0

  # 머리 위치 임계값 (픽셀)
  # head_y > floor_y - margin 일 때만 충격량 계산
  # 의사 코드의 floor_y, margin에 해당
  # 해상도 1080 기준 초기값, 실측 후 조정 필요
  floor_y: 900
  floor_margin: 50

  # 충격량(impulse = estimated_mass × Δv, kg·m/s) 임계값
  # L_factor로 보정된 두부 질량을 사용하므로 delta_v가 아닌 impulse 기준으로 판정
  #
  # 참고 수치 (성인 기준 head_mass ≈ 5kg):
  #   Δv ~1.5 m/s → impulse ~7.5  N·s  (저위험)
  #   Δv ~3.0 m/s → impulse ~15.0 N·s  (주의)
  #   Δv ~5.0 m/s → impulse ~25.0 N·s  (위험)
  # 어린이는 l_factor가 작아 같은 Δv에서 impulse가 더 낮게 계산됨
  impulse_caution: 15.0   # 저위험 / 주의 경계 (kg·m/s)
  impulse_danger:  25.0   # 주의   / 위험 경계 (kg·m/s)

  # 위험도 라벨
  labels:
    low:     "저위험"
    caution: "주의"
    danger:  "위험"


# ─────────────────────────────────────────
# 화면 표시 설정
# ─────────────────────────────────────────
visualizer:

  show_depth_overlay: true      # 깊이맵 반투명 오버레이 표시
  show_keypoints: true          # keypoint 표시
  show_bbox: true               # bounding box 표시
  show_track_id: true           # 트랙 ID 표시
  show_danger_level: true       # 위험도 등급 표시
  show_impulse_value: true      # 충격량 수치 표시
  show_cog: true                # 무게중심(CoG) 표시

  # 위험도별 bounding box 색상 (BGR)
  colors:
    normal:  [0, 255, 0]        # 초록
    caution: [0, 165, 255]      # 주황
    danger:  [0, 0, 255]        # 빨강


# ─────────────────────────────────────────
# 클립 저장 (현재 비활성화 / 필요 시 true로 변경)
# ─────────────────────────────────────────
clip:
  enabled: false
  save_dir: "logs/clips"
  pre_fall_sec: 3.0     # 낙상 판정 전 몇 초를 함께 저장할지
  post_fall_sec: 2.0    # 낙상 판정 후 몇 초를 함께 저장할지