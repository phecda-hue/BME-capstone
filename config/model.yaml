# config/model.yaml

device: "cuda"   # 연구실에서 "cuda"로 교체


# ─────────────────────────────────────────
# Depth Anything V2 - Small Metric (Outdoor)
# ─────────────────────────────────────────
depth:
  # HuggingFace에서 자동 다운로드 (최초 1회)
  model_id: "depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf"

  # 또는 로컬 가중치 사용 시 아래 경로 지정 (model_id보다 우선)
  # checkpoint: "models/checkpoints/da2_small_metric_outdoor.pth"

  input_size: 518       # DA2 기본 입력 해상도 (정확도·속도 트레이드오프)
                        # 노트북 테스트 시 392로 낮추면 빠름
  max_depth: 10.0       # 미터 단위 출력 상한 (camera.yaml depth.max_depth_m과 맞출 것)
  fp16: true           # GPU에서 true로 설정 시 속도 향상 (CPU는 미지원)


# ─────────────────────────────────────────
# YOLOv11-pose - Nano
# ─────────────────────────────────────────
pose:
  # ultralytics에서 자동 다운로드 (최초 1회)
  model_id: "yolo11n-pose.pt"

  # 또는 로컬 가중치 사용 시
  # checkpoint: "models/checkpoints/yolo11n-pose.pt"

  input_size: 640       # YOLO 입력 해상도
  conf_threshold: 0.5   # 사람 감지 최소 신뢰도
  iou_threshold: 0.45   # NMS IoU 임계값
  fp16: true           # GPU에서 true로 설정


# ─────────────────────────────────────────
# DeepSORT ReID
# ─────────────────────────────────────────
tracker:
  embedder: "mobilenet"   # 내장 MobileNet ReID (별도 가중치 불필요)
  max_age: 30             # 미감지 허용 프레임 수
  n_init: 3               # 트랙 확정까지 필요한 연속 감지 수
  nn_budget: 100          # ReID 특징 벡터 저장 최대 수